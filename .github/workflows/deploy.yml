name: Deploy NicheStream

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build Worker
        run: cd apps/worker && pnpm build

      - name: Build Web (Pages)
        run: cd apps/web && pnpm build:pages

      - name: Validate Cloudflare Credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ ERROR: CLOUDFLARE_API_TOKEN secret is missing"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ ERROR: CLOUDFLARE_ACCOUNT_ID secret is missing"
            exit 1
          fi
          echo "✓ Cloudflare credentials configured"

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STREAM_API_TOKEN: ${{ secrets.STREAM_API_TOKEN }}
          STREAM_ACCOUNT_ID: ${{ secrets.STREAM_ACCOUNT_ID }}
          HYPERDRIVE_ID: ${{ secrets.HYPERDRIVE_ID }}
        run: |
          cd apps/worker
          # Substitute HYPERDRIVE_ID in wrangler.toml if it's provided
          if [ -n "$HYPERDRIVE_ID" ]; then
            sed -i "s/YOUR_HYPERDRIVE_ID/$HYPERDRIVE_ID/g" wrangler.toml
          fi
          pnpm exec wrangler deploy

      - name: Deploy Pages to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/web
          pnpm exec wrangler pages deploy .vercel/output/static || {
            echo "⚠️  Pages deployment failed"
            echo "Verify the Cloudflare Pages project 'nichestream-web' exists"
            echo "See: https://dash.cloudflare.com/pages"
            exit 0
          }

      - name: Notify deployment
        if: success()
        run: echo "✅ NicheStream deployed successfully!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
