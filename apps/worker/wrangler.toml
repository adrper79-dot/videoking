name = "nichestream-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "VIDEO_ROOM"
class_name = "VideoRoom"

[[durable_objects.bindings]]
name = "USER_PRESENCE"
class_name = "UserPresence"

[[migrations]]
tag = "v1"
new_classes = ["VideoRoom", "UserPresence"]

# Hyperdrive binding for low-latency access to Neon Postgres.
# For local development, set WRANGLER_HYPERDRIVE_LOCAL_CONNECTION_STRING_DB env var
# to your local Postgres connection string (e.g., postgresql://user:pass@localhost/dbname)
[[hyperdrive]]
binding = "DB"
id = "72697ebbf0d44419850743679390acf1"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "videoking-r2"

[vars]
# Your Cloudflare account ID (found in the dashboard top-right or via `wrangler whoami`)
STREAM_ACCOUNT_ID = ""
# Your Cloudflare Stream customer subdomain.
# Found in the Stream dashboard under Settings → Customer Domain.
# Example: if your Stream URLs look like customer-abc123.cloudflarestream.com, set "abc123".
STREAM_CUSTOMER_DOMAIN = ""
PLATFORM_FEE_PERCENT = "20"
STRIPE_CITIZEN_MONTHLY_PRICE = ""
STRIPE_CITIZEN_ANNUAL_PRICE = ""
STRIPE_VIP_MONTHLY_PRICE = ""
STRIPE_VIP_ANNUAL_PRICE = ""
CHAT_RATE_LIMIT_FREE_MS = "10000"
CHAT_RATE_LIMIT_CITIZEN_MS = "1000"
CHAT_RATE_LIMIT_VIP_MS = "500"
TRIAL_PERIOD_DAYS = "14"
# Public URL of the web frontend (used for Stripe and BetterAuth redirect URLs)
# IMPORTANT: APP_BASE_URL must be set via environment-specific secrets:
#   - Development: Add APP_BASE_URL to .dev.vars
#   - Production: Run `wrangler secret put APP_BASE_URL`
# Stripe Connect Client ID for creator account onboarding
STRIPE_CONNECT_CLIENT_ID = ""
# Platform fee percentage for creator payouts (deducted from revenue)
# Already defined above; this is for reference in payout calculations

# ─── Secrets (set via `wrangler secret put <NAME>`) ──────────────────────────
# BETTER_AUTH_SECRET      — BetterAuth signing secret (required)
# STRIPE_SECRET_KEY       — Stripe API secret key (required)
# STRIPE_WEBHOOK_SECRET   — Stripe webhook signing secret (required)
# STREAM_API_TOKEN        — Cloudflare Stream API token (required)
# EMAIL_API_KEY           — Resend API key for transactional emails (required for email sends)

# ─── Routes ──────────────────────────────────────────────────────────────────
# Custom domain routing for the Worker
[[routes]]
pattern = "api.itsjusus.com/*"
zone_name = "itsjusus.com"

# ─── Scheduled Cron Triggers ──────────────────────────────────────────────────
# Fires the `scheduled` handler daily at 10:00 UTC to send trial expiry emails
[[triggers]]
crons = ["0 10 * * *"]
